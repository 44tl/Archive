    <style>
        :root {

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        header {
            position: relative;
            z-index: 10;
            padding: 80px 40px 40px;
            text-align: left;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-meta {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-family: var(--font-sans);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 100;
            letter-spacing: -2px;
            color: var(--text-bright);
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
        }

        .research-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 8, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
        }

        .research-nav button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 12px 20px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .research-nav button:hover {
            color: var(--text-bright);
            border-color: var(--text-dim);
            background: rgba(0, 242, 255, 0.05);
        }

        .research-nav button.active {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .nav-divider {
            width: 1px;
            height: 25px;
            background: var(--border);
            margin: 0 15px;
        }

        .page-content {
            display: none;
            position: relative;
            z-index: 1;
            padding-bottom: 100px;
            pointer-events: auto;
        }

        .page-content.active {
            display: block;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2px;
            background: var(--border);
            border: 1px solid var(--border);
            max-width: 1600px;
            margin: 0 auto;
            pointer-events: auto;
        }

        .item {
            position: relative;
            background: var(--surface);
            aspect-ratio: 1/1;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.5s ease;
            z-index: 10;
            pointer-events: auto !important;
        }

        .item img, .item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
            display: block;
        }

        .item:hover {
            border-color: var(--accent);
        }

        .item:hover img, .item:hover video {
            opacity: 1;
            transform: scale(1.05);
        }

        .item-overlay {
            position: absolute;
            inset: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.8) 100%);
            opacity: 0.8;
            transition: opacity 0.3s ease;
            z-index: 5;
        }

        .item:hover .item-overlay {
            opacity: 1;
        }

        .item-id {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-dim);
        }

        .item-info {
            font-family: var(--font-mono);
        }

        .item-class {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .item-status {
            font-size: 0.8rem;
            color: var(--text-bright);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-status::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }

        .research-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 40px;
        }

        .dossier {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 60px;
            position: relative;
        }

        

        .research-page h2 {
            font-family: var(--font-sans);
            font-size: 2.5rem;
            font-weight: 100;
            color: var(--text-bright);
            margin-bottom: 40px;
            line-height: 1.1;
        }

        .research-page h3 {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--accent);
            margin: 40px 0 20px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--accent-dim);
            padding-bottom: 8px;
        }

        .research-page p {
            margin-bottom: 24px;
            color: var(--text);
            font-size: 1.05rem;
            text-align: justify;
        }

        .research-page table {
            width: 100%;
            border-collapse: collapse;
            margin: 32px 0;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .research-page th {
            text-align: left;
            padding: 12px;
            color: var(--accent);
            border-bottom: 1px solid var(--accent-dim);
            background: rgba(0, 242, 255, 0.03);

        .research-page td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
        }

        .research-page tr:hover td {
            color: var(--text-bright);
            background: rgba(255, 255, 255, 0.02);
        }

            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            color: var(--secondary);
            text-align: center;
        }

        /* Lightbox */
        .lightbox {
            display: flex;
            opacity: 0;
            pointer-events: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 2, 6, 0.98);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lb-content {
            display: flex;
            align-items: center;
            gap: 30px;
            max-width: 95vw;
            max-height: 90vh;
        }

        .lb-media-wrap {
            transform: scale(0.95);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .lightbox.active .lb-media-wrap {
            transform: scale(1);
        }

        .lb-media-wrap img, .lb-media-wrap video {
            max-width: 70vw;
            max-height: 85vh;
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .lb-media-wrap img.zoomed {
            cursor: zoom-out;
            transform: scale(2);
        }

        .lb-info {
            font-family: var(--font-mono);
            color: var(--text);
            min-width: 200px;
            max-width: 300px;
        }

        .lb-info h3 {
            color: var(--accent);
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .lb-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text);
            font-size: 3rem;
            padding: 10px 20px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            font-family: var(--font-mono);
        }

        .lb-prev { left: 20px; }

        .lb-next { right: 20px; }

        .lb-nav:hover {
            border-color: var(--accent);
            color: var(--accent);

            flex-direction: column;
            align-items: center;
            gap: 15px;

            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;

        .github-link:hover {

        .github-icon {
            width: 20px;
            height: 20px;
        }

        .footer-center p {
            color: var(--text-dim);
            font-size: 0.75rem;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
        }

        .footer-section h4 {
            color: var(--accent);
            font-size: 0.75rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .footer-section p, .footer-section a {
            color: var(--text-dim);
            font-size: 0.7rem;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;

        .footer-section a:hover { color: var(--text-bright); }

        @media (max-width: 768px) {
            header { padding: 40px 15px 20px; }
            h1 { font-size: 2rem !important; text-align: center; }
            .gallery { grid-template-columns: 1fr; gap: 10px; }
            .dossier { padding: 20px; }

                font-size: 0.7rem;
                padding: 8px 12px;

            .page-content { padding: 10px; }
            .lightbox { padding: 20px; }
            .lb-content { flex-direction: column; }
            .lb-media-wrap img, .lb-media-wrap video { max-width: 100vw; max-height: 60vh; }

            .lb-prev { left: 5px; }
            .lb-next { right: 5px; }
            footer { padding: 40px 20px; }
            .research-page h2 { font-size: 1.5rem; }
            .research-page h3 { font-size: 1.1rem; }
            .research-page p { font-size: 0.9rem; }
            .research-page table { font-size: 0.75rem; }
            .research-page pre { font-size: 0.65rem; overflow-x: auto; }
            .math { font-size: 0.8rem; overflow-x: auto; }
        }

        @media (max-width: 480px) {
            header { padding: 30px 10px 15px; }
            h1 { font-size: 1.5rem !important; }
            .gallery { gap: 8px; }
            .dossier { padding: 15px; }
            .research-nav button { font-size: 0.6rem; padding: 6px 8px; }
            .lb-nav { font-size: 1.5rem; }
        }

        @media (min-width: 1200px) {
            .gallery { grid-template-columns: repeat(4, 1fr); }
        }

        @media (min-width: 1600px) {
            .gallery { grid-template-columns: repeat(5, 1fr); }
        }

        <p>The strategic landscape of national security is currently undergoing a fundamental reorientation driven by the recognition of Unidentified Anomalous Phenomena (UAP) that exhibit capabilities transcending traditional domain boundaries. Historically, the military and intelligence communities have categorized unidentified objects according to the medium in which they were detected principally as aerial or maritime anomalies. However, contemporary sensor data and multi-witness accounts have revealed a class of objects capable of seamless transmedium travel, specifically transitioning between the atmosphere and the hydrosphere without the catastrophic structural failure or massive kinetic energy dissipation typically associated with such maneuvers.</p>
        <h2>Foundational Framework and Taxonomic Definitions</h2>
        <p>The shift in nomenclature from Unidentified Flying Objects (UFOs) to Unidentified Anomalous Phenomena (UAP) is more than a linguistic rebranding; it represents a comprehensive expansion of the investigatory scope. As codified in the National Defense Authorization Act (NDAA) for Fiscal Year 2023, UAPs are defined as airborne objects that are not immediately identifiable, transmedium objects or devices, and submerged objects that display performance characteristics suggesting they may be related to the former categories. The term "transmedium" specifically refers to the ability of an object to cross domains, such as moving from outer space into the atmosphere or from the atmosphere into the ocean.</p>
        <p>Within the maritime context, these phenomena are frequently referred to as Unidentified Submerged Objects (USOs) or "fast movers". The Department of Defense (DoD) considers these as sources of anomalous detections that demonstrate behaviors not readily understood by current sensors or observers, particularly when those behaviors exceed known performance envelopes in terms of velocity, maneuverability, or material resilience. The official recognition of these objects as "all-domain" threats has necessitated the creation of the All-domain Anomaly Resolution Office (AARO), which is tasked with synchronizing domain awareness across the skies, sea, and space.</p>

        <h3>The 2013 Aguadilla Infrared Analysis</h3>

        <p>The object was observed traveling at speeds approaching 100 mph at extremely low altitudes, sometimes below tree-top level, without navigation lights or discernible propulsion surfaces. Most significantly, the object was filmed entering the Atlantic Ocean with "minimal impact," maintaining its trajectory without the large-scale splash or deceleration that would be expected of a solid object hitting the water at high speed. After a period of submersion, the object appeared to exit the water and enlarge, subsequently splitting into two equal parts, both of which then re-entered the water at different times.</p>
        <p>The SCU's analysis utilized FAA radar data to independently validate the object's velocity and trajectory, which corroborated the video metadata. Despite claims from skeptics that the object might be a balloon or a Chinese lantern, the SCU's investigation ruled out these possibilities based on the object's speed relative to local wind conditions (minimum 16 mph wind would be required for a lantern to match the track, which exceeds the stability threshold for such objects) and its observed disappearance into the water.</p>

const gallery = document.getElementById('gallery');
const researchNav = document.getElementById('research-nav');
const researchContainer = document.getElementById('research-container');
const homePage = document.getElementById('home-page');
const researchPage = document.getElementById('research-page');
const lb = document.getElementById('lightbox');
const lbWrap = document.getElementById('lb-media-wrap');
const lbInfo = document.getElementById('lb-info');

function initGallery() {
    media.forEach((item, index) => {
        const el = document.createElement('div');
        el.className = 'item';
        el.onclick = () => openLb(index);

        if (item.type === 'video') {
            const video = document.createElement('video');
            video.src = item.url;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            el.appendChild(video);
        } else {
            const img = document.createElement('img');
            img.src = item.url;
            el.appendChild(img);
        }

        gallery.appendChild(el);
    });
}

function initNav() {
    const homeBtn = document.createElement('button');
    homeBtn.textContent = 'DATABASE';
    homeBtn.className = 'active';
    homeBtn.onclick = () => showPage('home', homeBtn);
    researchNav.appendChild(homeBtn);

    const divider = document.createElement('div');
    divider.className = 'nav-divider';
    researchNav.appendChild(divider);

    researchDocs.forEach(doc => {
        const btn = document.createElement('button');
        btn.textContent = doc.title;
        btn.onclick = () => showResearch(doc.id, btn);
        researchNav.appendChild(btn);
    });
}

function showPage(page, btn) {
    document.querySelectorAll('.research-nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (page === 'home') {
        homePage.classList.add('active');
        researchPage.classList.remove('active');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResearch(id, btn) {
    const doc = researchDocs.find(d => d.id === id);
    if (!doc) return;

    document.querySelectorAll('.research-nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    homePage.classList.remove('active');
    researchPage.classList.add('active');

    researchContainer.innerHTML = `
        <div class="dossier research-page">
            ${doc.content}
        </div>
    `;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

let currentIndex = 0;

function openLb(index) {
    currentIndex = index;
    const item = media[index];
    if (item.type === 'video') {
        lbWrap.innerHTML = `<video src="${item.url}" controls autoplay></video>`;
        lbInfo.innerHTML = `<h3>MEDIA INFO</h3><p>ID: ${item.id}</p><p>Type: Video</p>`;
    } else {
        lbWrap.innerHTML = `<img src="${item.url}" onclick="toggleZoom(this)">`;
        lbInfo.innerHTML = `<h3>MEDIA INFO</h3><p>ID: ${item.id}</p><p>Type: Image</p><p>Click image to zoom</p>`;
    }
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function navigateLb(direction) {
    currentIndex = (currentIndex + direction + media.length) % media.length;
    openLb(currentIndex);
}

function toggleZoom(img) {
    img.classList.toggle('zoomed');
}

function closeLb() {
    lb.classList.remove('active');
    document.body.style.overflow = '';
}

let touchStartX = 0;
lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
lb.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
        navigateLb(diff > 0 ? 1 : -1);
    }
});

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w, h;
let particles = [];

function initBg() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    particles = [];
    for(let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            size: Math.random() * 2,
            speedX: (Math.random() - 0.5) * 0.5,
            speedY: (Math.random() - 0.5) * 0.5,
            opacity: Math.random() * 0.5
        });
    }
}

function animateBg() {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#00f2ff';
    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if(p.x < 0) p.x = w;
        if(p.x > w) p.x = 0;
        if(p.y < 0) p.y = h;
        if(p.y > h) p.y = 0;
        ctx.globalAlpha = p.opacity;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    requestAnimationFrame(animateBg);
}

window.addEventListener('resize', initBg);

document.addEventListener('DOMContentLoaded', () => {
    initBg();
    animateBg();
    initGallery();
    initNav();
    const title = document.getElementById('title');
    const fonts = ['Inter', 'JetBrains Mono', 'Courier Prime', 'Space Mono', 'Fira Code', 'Source Code Pro', 'IBM Plex Mono', 'Roboto Mono', 'Syne Mono', 'Creepster', 'VT323', 'Silkscreen', 'Chakra Petch', 'Orbitron', 'Share Tech Mono', 'Major Mono Display', 'Recursive', 'Azeret Mono', 'Bungee Shade', 'Bungee Outline', 'Monoton', 'Rubik Glitch', 'Press Start 2P', 'Faster One', 'Bowlby One SC', 'Rubik Mono One', 'Nosifer', 'Ewert', 'Butcherman', 'New Rocker', 'Pirata One', 'Rye', 'Metal Mania', 'Shojumaru', 'Cinzel Decorative', 'Fruktur', 'Diplomata SC', 'Unlock', 'Wallpoet', 'Electromechanica', 'Geo', 'Dela Gothic One'];
    setInterval(() => {
        const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
        title.style.fontFamily = randomFont;
    }, 500);
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLb();
});
