<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFO Archive</title>
    <link rel="preconnect" href="https://cdn.discordapp.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #050508;
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.9;
        }

        header, .gallery, footer, .research-page, .research-nav {
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: clamp(40px, 8vw, 60px) 20px clamp(30px, 5vw, 40px);
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 200;
            letter-spacing: clamp(4px, 1vw, 8px);
            text-transform: uppercase;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
            gap: clamp(16px, 2vw, 24px);
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px clamp(16px, 3vw, 24px) 60px;
        }

        .item {
            position: relative;
            background: #0f0f13;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.04);
            aspect-ratio: 4/3;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            contain: paint;
        }

        .item:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 212, 255, 0.15);
            box-shadow: 0 24px 48px rgba(0,0,0,0.6), 0 0 40px rgba(0, 212, 255, 0.08);
        }

        .item img, .item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .item:hover img, .item:hover video { transform: scale(1.08); }

        .video-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            color: #00d4ff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(0,212,255,0.2);
            pointer-events: none;
            z-index: 3;
        }

        .loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f13;
            z-index: 2;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255,255,255,0.06);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f0f13;
            color: #444;
            font-size: 0.8rem;
            gap: 8px;
            z-index: 2;
        }

        .lightbox {
            display: flex;
            opacity: 0;
            pointer-events: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 2, 6, 0.96);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.35s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lb-media-wrap {
            position: relative;
            max-width: 92vw;
            max-height: 84vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.96);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lightbox.active .lb-media-wrap {
            transform: scale(1);
        }

        .lightbox img, .lightbox video {
            max-width: 100%;
            max-height: 84vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.8);
        }

        .lightbox video { background: #000; }

        .lb-close {
            position: absolute;
            top: 24px;
            right: 32px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
            z-index: 10;
        }

        .lb-close:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }

        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.25s;
            user-select: none;
            z-index: 10;
        }

        .lb-nav:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
        }

        .lb-prev { left: 24px; }
        .lb-next { right: 24px; }

        .lb-counter {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            padding: 50px 20px 60px;
            border-top: 1px solid rgba(255,255,255,0.04);
            margin-top: 40px;
        }

        footer p {
            color: rgba(255,255,255,0.25);
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        footer a {
            color: rgba(0, 212, 255, 0.6);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        footer a:hover { color: #00d4ff; }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); gap: 16px; }
            .lb-nav { display: none; }
            .lb-close { top: 16px; right: 16px; }
        }

        @media (max-width: 480px) {
            .gallery { grid-template-columns: 1fr; }
            header { padding: 40px 20px 30px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            #bg { display: none; }
        }

        .research-page {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px clamp(20px, 4vw, 40px) 80px;
            animation: fadeIn 0.5s ease;
        }

        .research-page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .research-page h2 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #00d4ff;
            margin-bottom: 8px;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .research-page h3 {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-weight: 400;
            color: #7b2cbf;
            margin-top: 36px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .research-page h4 {
            font-size: clamp(1rem, 2vw, 1.15rem);
            font-weight: 500;
            color: #a0a0b0;
            margin-top: 24px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .research-page p {
            font-size: clamp(0.95rem, 1.8vw, 1.05rem);
            line-height: 1.75;
            color: #c0c0d0;
            margin-bottom: 16px;
            text-align: justify;
            hyphens: auto;
        }

        .research-page table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            overflow-x: auto;
            display: block;
        }

        .research-page table thead {
            background: rgba(0, 212, 255, 0.08);
        }

        .research-page table th {
            color: #00d4ff;
            font-weight: 500;
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            white-space: nowrap;
        }

        .research-page table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #b0b0c0;
            line-height: 1.5;
            vertical-align: top;
        }

        .research-page table tbody tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .research-page code {
            background: rgba(0, 212, 255, 0.08);
            color: #00d4ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }

        .research-page pre {
            background: #0a0a12;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            margin: 20px 0;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: clamp(0.8rem, 1.5vw, 0.9rem);
            line-height: 1.6;
            color: #a0a0b0;
        }

        .research-page blockquote {
            border-left: 3px solid #7b2cbf;
            padding-left: 20px;
            margin: 20px 0;
            color: #a0a0b0;
            font-style: italic;
            line-height: 1.7;
        }

        .research-page ul, .research-page ol {
            margin: 16px 0 16px 24px;
            color: #c0c0d0;
            line-height: 1.8;
        }

        .research-page li {
            margin-bottom: 8px;
        }

        .research-page strong {
            color: #e0e0f0;
            font-weight: 500;
        }

        .research-page em {
            color: #b0b0d0;
        }

        .research-page hr {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 40px 0;
        }

        .research-page .math {
            overflow-x: auto;
            padding: 12px 0;
        }

        .research-nav {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto 34px;
            padding: 14px 24px 20px;
            background: linear-gradient(180deg, rgba(5,5,8,0.96), rgba(5,5,8,0.72), rgba(5,5,8,0));
            backdrop-filter: blur(12px);
        }

        .research-nav button {
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.12);
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.25s;
            font-family: inherit;
        }

        .research-nav button:hover, .research-nav button.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.3);
            color: #fff;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.25s;
            font-family: inherit;
            margin-bottom: 32px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-color: rgba(255,255,255,0.15);
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
        }

        .toc {
            background: rgba(0, 212, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            margin: 24px 0 32px;
        }

        .toc h4 {
            color: #00d4ff;
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .toc ul {
            margin: 0;
            list-style: none;
        }

        .toc li {
            margin-bottom: 6px;
        }

        .toc a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: block;
            padding: 4px 0;
        }

        .toc a:hover {
            color: #00d4ff;
        }

        @media (max-width: 640px) {
            .research-page table {
                font-size: 0.75rem;
            }
            .research-page table th, .research-page table td {
                padding: 8px 10px;
            }
        }
    </style>
</head>

<canvas id="bg"></canvas>

<header>
    <h1>UFO Archive</h1>

let current = 0;
const gallery = document.getElementById('gallery');
const lb = document.getElementById('lightbox');
const lbWrap = document.getElementById('lb-media-wrap');
const lbCount = document.getElementById('lb-count');

const videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const v = entry.target;
        if (entry.isIntersecting) {
            v.play().catch(() => {});
        } else {
            v.pause();
        }
    });
}, { threshold: 0.1 });

function reveal(el, loading) {
    loading.style.display = 'none';
    el.style.display = 'block';
}

function createItem(item, index) {
    const el = document.createElement('div');
    el.className = 'item';

    const loading = document.createElement('div');
    loading.className = 'loading';
    loading.innerHTML = '<div class="spinner"></div>';
    el.appendChild(loading);

    if (item.type === 'video') {
        const badge = document.createElement('div');
        badge.className = 'video-badge';
        badge.textContent = 'MP4';
        el.appendChild(badge);

        const video = document.createElement('video');
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.autoplay = true;
        video.preload = 'metadata';

        video.onloadeddata = () => reveal(video, loading);
        video.onerror = () => showError(el, loading);

        video.src = item.url;
        el.appendChild(video);
        videoObserver.observe(video);
    } else {
        const img = document.createElement('img');
        img.alt = '';
        img.loading = 'lazy';
        img.decoding = 'async';

        img.onload = () => reveal(img, loading);
        img.onerror = () => showError(el, loading);

        img.src = item.url;

        if (img.complete && img.naturalWidth > 0) {
            reveal(img, loading);
        }

        el.appendChild(img);
    }

    el.onclick = () => openLb(index);
    return el;
}

function showError(el, loading) {
    loading.style.display = 'none';
    const err = document.createElement('div');
    err.className = 'error';
    err.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>Failed to load';
    el.appendChild(err);
}

media.forEach((item, i) => gallery.appendChild(createItem(item, i)));

function openLb(index) {
    current = index;
    renderLb();
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function renderLb() {
    lbWrap.innerHTML = '';
    const item = media[current];

    if (item.type === 'video') {
        const video = document.createElement('video');
        video.src = item.url;
        video.controls = true;
        video.autoplay = true;
        lbWrap.appendChild(video);
    } else {
        const img = document.createElement('img');
        img.src = item.url;
        lbWrap.appendChild(img);
    }

    lbCount.textContent = `${current + 1} / ${media.length}`;
}

function closeLb() {
    lb.classList.remove('active');
    document.body.style.overflow = '';
    const v = lbWrap.querySelector('video');
    if (v) v.pause();
}

function nav(dir) {
    current += dir;
    if (current < 0) current = media.length - 1;
    if (current >= media.length) current = 0;
    renderLb();
}

document.addEventListener('keydown', e => {
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') nav(-1);
    if (e.key === 'ArrowRight') nav(1);
});

lb.addEventListener('click', e => {
    if (e.target === lb) closeLb();
});

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w, h;

function drawStars() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    for (let i = 0; i < 300; i++) {
        const x = Math.random() * w;
        const y = Math.random() * h;
        const r = Math.random() * 1.1;
        const a = Math.random() * 0.5 + 0.05;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
        ctx.fill();
    }
}

drawStars();
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(drawStars, 150);
});

<h3>Black Hole Thermodynamics and Microstate Counting</h3>
<p>One of the most rigorous tests for any theory of quantum gravity is its ability to explain the thermodynamics of black holes. In 1996, Andrew Strominger and Cumrun Vafa used the tools of the second superstring revolution to provide the first microscopic derivation of black hole entropy.</p>

<p>They focused on extremal black holes those with the minimum possible mass for a given charge, which are stable and mathematically tractable. By modeling these black holes as a collection of D-branes and strings, they were able to count the quantum states (microstates) of the system. The result was a triumphant success: the number of microstates N led to a statistical entropy S = k<sub>B</sub> ln N that exactly matched the Bekenstein-Hawking formula.</p>

<h3>The Holographic Principle and the AdS/CFT Correspondence</h3>
<p>The insights gained from black hole entropy led to the formulation of the holographic principle, an idea proposed by Gerard 't Hooft and Leonard Susskind which suggests that the description of a volume of space can be thought of as encoded on a lower-dimensional boundary.</p>

<p>The most precise realization of this principle is the AdS/CFT correspondence, discovered by Juan Maldacena in late 1997. It posits a complete equivalence between a theory of quantum gravity in a five-dimensional Anti-de Sitter (AdS) space and a four-dimensional Conformal Field Theory (CFT) without gravity living on the boundary.</p>

<h3>The Swampland Program and de Sitter Physics</h3>
<p>In response to the landscape problem, Cumrun Vafa initiated the Swampland Program in 2005. The goal of this program is to delineate the Landscape the set of low-energy effective theories that are compatible with a UV-complete theory of quantum gravity from the Swampland, which consists of theories that look consistent but actually have no quantum gravity completion.</p>

<h3>Experimental Signatures and Observational Cosmology</h3>
<p>The primary criticism of string theory its lack of experimental evidence has been challenged by the emergence of string cosmology and string phenomenology. While direct detection of a string is unlikely, the theory predicts macroscopic consequences that can be observed with current or near-future technology.</p>

<p>In 2025 and 2026, Pulsar Timing Arrays (PTAs) like the NANOGrav collaboration reported significant evidence for a stochastic gravitational-wave background in the nanohertz frequency range. Analysis of this signal suggests it could be the result of a network of cosmic strings with a tension of G&#x03BC; &#x2248; 10<sup>-7</sup> to 10<sup>-8</sup>.</p>

const researchNav = document.getElementById('research-nav');
const researchContainer = document.getElementById('research-container');
const homePage = document.getElementById('home-page');
const researchPage = document.getElementById('research-page');

const homeBtn = document.createElement('button');
homeBtn.textContent = 'Archive';
homeBtn.className = 'active';
homeBtn.onclick = () => showPage('home');
researchNav.appendChild(homeBtn);

researchDocs.forEach(doc => {
    const btn = document.createElement('button');
    btn.textContent = doc.title;
    btn.onclick = () => showResearch(doc.id);
    researchNav.appendChild(btn);
});

function showPage(page) {
    if (page === 'home') {
        homePage.classList.add('active');
        researchPage.classList.remove('active');
        homeBtn.classList.add('active');
        Array.from(researchNav.children).forEach((btn, i) => {
            if (i > 0) btn.classList.remove('active');
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function showResearch(id) {
    const doc = researchDocs.find(d => d.id === id);
    if (!doc) return;

    homePage.classList.remove('active');
    researchPage.classList.add('active');

    Array.from(researchNav.children).forEach((btn, i) => {
        btn.classList.toggle('active', i === researchDocs.findIndex(d => d.id === id) + 1);
    });

    researchContainer.innerHTML = `
        <div class="research-page active">
            <button class="back-btn" onclick="showPage('home')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Archive
            </button>
            ${doc.content}
        </div>
    `;

    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
